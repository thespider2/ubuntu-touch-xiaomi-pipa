pipa:
  Name: pipa
  PrettyName: "Xiaomi Pad 6"
  DeviceType: tablet
  GridUnit: 20
  SupportedOrientations:
    - Landscape
    - InvertedLandscape
    - Portrait
    - InvertedPortrait
  PrimaryOrientation: Landscape
  PortraitOrientation: Portrait
  InvertedPortraitOrientation: InvertedPortrait
  LandscapeOrientation: Landscape
  InvertedLandscapeOrientation: InvertedLandscape

  Mir:
    CursorTheme: default
    CursorSize: 48
    DisplayName: "Xiaomi Pad 6"
    PhysicalDisplayWidth: 250
    PhysicalDisplayHeight: 160
    RefreshRate: 144000

  DoubleTapToWake:
    - /sys/touchpanel/double_tap|1|0
  NoSuspendOnCharger: true

  FilesystemEncryption: true

  HfdService:
    HasFusionKeyboard: false
    HasPhysicalKeyboard: false
