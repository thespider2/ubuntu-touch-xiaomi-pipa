# Detect the active slot and flash to it (instead of the opposite slot).
# flash-bootimage sources all files in /etc/flash-bootimage/ as shell,
# so we can use logic here to override the partition targets.

# Read current slot from kernel cmdline
SLOT_SUFFIX=$(grep -o 'androidboot\.slot_suffix=_[a-b]' /proc/cmdline 2>/dev/null | cut -d= -f2)

case "${SLOT_SUFFIX}" in
	"_a")
		BOOTIMAGE_SLOT_A="/dev/disk/by-partlabel/boot_a"
		DTBO_SLOT_A="/dev/disk/by-partlabel/dtbo_a"
		VBMETA_SLOT_A="/dev/disk/by-partlabel/vbmeta_a"
		;;
	"_b")
		BOOTIMAGE_SLOT_A="/dev/disk/by-partlabel/boot_b"
		DTBO_SLOT_A="/dev/disk/by-partlabel/dtbo_b"
		VBMETA_SLOT_A="/dev/disk/by-partlabel/vbmeta_b"
		;;
	*)
		# No slot suffix — non-A/B device, use bare partition labels
		BOOTIMAGE_SLOT_A="/dev/disk/by-partlabel/boot"
		DTBO_SLOT_A="/dev/disk/by-partlabel/dtbo"
		VBMETA_SLOT_A="/dev/disk/by-partlabel/vbmeta"
		;;
esac

# Disable A/B opposite-slot logic so flash-bootimage uses our targets as-is
DEVICE_IS_AB=no
DEVICE_SHOULD_SWITCH_SLOT=no
