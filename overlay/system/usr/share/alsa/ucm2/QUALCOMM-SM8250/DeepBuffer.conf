# Deep buffer use case for QUALCOMM SM8250 (Xiaomi Pad 6 - pipa)
# Deep buffer provides low-power audio playback for media.
# Extract actual mixer paths from /vendor/etc/audio_*_policy_configuration.xml
# using droidian-audio-setup extract UCM for optimal power efficiency.

SectionDevice."DeepBuffer" {
    Comment "Deep buffer playback"

    EnableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
    ]

    DisableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
    ]
}
