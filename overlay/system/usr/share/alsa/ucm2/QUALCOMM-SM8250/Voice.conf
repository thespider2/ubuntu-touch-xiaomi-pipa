# Voice use case for QUALCOMM SM8250 (Xiaomi Pad 6 - pipa)
# Extract actual mixer paths from /vendor/etc/audio_*_policy_configuration.xml
# using droidian-audio-setup extract UCM for full voice call support.

SectionDevice."Voice" {
    Comment "Voice call"

    EnableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
        cset "name='TX_CDC_DMA_TX_3 Audio Mixer MultiMedia1' 1"
    ]

    DisableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
        cset "name='TX_CDC_DMA_TX_3 Audio Mixer MultiMedia1' 0"
    ]
}
