# HiFi use case for Xiaomi Pad 6 (pipa) — kona-mtp-snd-card
#
# Speaker output goes through MultiMedia1 (hw:0,0) -> Tertiary TDM0 backend,
# which feeds 4x Awinic AW88261 smart amps (i2c 2-0034/2-0035/0-0036/0-0037).
# This is the pipa-specific path (CONFIG_MACH_XIAOMI_PIPA) from techpack/audio/asoc/kona.c.
#
# Speaker layout (from pipa-sm8250.dtsi sound-channel):
#   TDM slot 0 = top-left    (@0x34, pri_l)
#   TDM slot 1 = bottom-left (@0x36, pri_r)
#   TDM slot 2 = bottom-right(@0x37, sec_l)
#   TDM slot 3 = top-right   (@0x35, sec_r)
# All four amps each read a distinct TDM slot, so the backend must carry 4
# channels and PulseAudio must feed a 4-channel stream. With the default
# 4-channel map (FL,FR,RL,RR) and stereo->quad up-mix, slots receive L,R,L,R,
# which matches the layout above.

SectionVerb {
	EnableSequence [
	]

	DisableSequence [
	]

	Value {
		TQ "HiFi"
	}
}

SectionDevice."Speaker" {
	Comment "Speaker"

	Value {
		PlaybackPCM "hw:${CardId},0"
		PlaybackChannels "4"
		PlaybackPriority 200
	}

	EnableSequence [
		cset "name='TERT_TDM_RX_0 Channels' 3"
		cset "name='aw882xx_rx_switch' 1"
		cset "name='aw_dev_0_switch' 1"
		cset "name='aw_dev_1_switch' 1"
		cset "name='aw_dev_2_switch' 1"
		cset "name='aw_dev_3_switch' 1"
		cset "name='aw_dev_0_volume' 0"
		cset "name='aw_dev_1_volume' 0"
		cset "name='aw_dev_2_volume' 0"
		cset "name='aw_dev_3_volume' 0"
		cset "name='TERT_TDM_RX_0 Audio Mixer MultiMedia1' 1"
	]

	DisableSequence [
		cset "name='TERT_TDM_RX_0 Audio Mixer MultiMedia1' 0"
	]
}
