# HiFi use case for QUALCOMM SM8250
# Placeholder - run on-device:
#   droidian-audio-setup extract UCM
# to populate from /vendor/etc/audio_*_policy_configuration.xml

SectionDevice."Speaker" {
    Comment "Speaker playback"

    EnableSequence [
        cset "name='RX_HPH Volume' 20"
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
        cset "name='WSA_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
    ]

    DisableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
        cset "name='WSA_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
    ]
}

SectionDevice."Headphones" {
    Comment "Headphone playback"

    EnableSequence [
        cset "name='RX_HPH Volume' 20"
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
    ]

    DisableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
    ]
}

SectionDevice."Headset" {
    Comment "Headset with mic"

    EnableSequence [
        cset "name='RX_HPH Volume' 20"
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 1"
        cset "name='TX_CDC_DMA_TX_3 Audio Mixer MultiMedia1' 1"
    ]

    DisableSequence [
        cset "name='RX_CDC_DMA_RX_0 Audio Mixer MultiMedia1' 0"
        cset "name='TX_CDC_DMA_TX_3 Audio Mixer MultiMedia1' 0"
    ]
}
