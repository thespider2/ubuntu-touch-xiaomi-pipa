name: Build

on:
  push:
    branches: [ "main", "halium-13" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "halium-13" ]
  workflow_dispatch:

env:
  ADAPTATION_TOOLS_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            fakeroot flex git kmod libelf-dev libssl-dev libtinfo5 \
            lz4 python2 python3 sudo unzip wget xz-utils
          sudo ln -sf python2 /usr/bin/python
      - name: Download Android vendor/odm images
        run: |
          chmod +x scripts/fetch-android-partitions.sh
          ./scripts/fetch-android-partitions.sh
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Run build
        run: ./build.sh
      - name: Build focal device tarball
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          mv out/device_${DEVICE}.tar.xz out/device_${DEVICE}_24.04-1.x.tar.xz
          mv out/device_${DEVICE}.tar.build out/device_${DEVICE}_24.04-1.x.tar.build
          rm -f out/device_${DEVICE}_usrmerge.tar.*
          find workdir/tmp/system -not -path "*/lib/modules/*" -type f -delete
          find workdir/tmp/system -empty -type d -delete
          sed -i 's/deviceinfo_ubuntu_touch_release="24.04-1.x"/deviceinfo_ubuntu_touch_release="focal"/' deviceinfo
          ./build/build-tarball-mainline.sh "${DEVICE}" out workdir/tmp usrmerge
          mv out/device_${DEVICE}.tar.xz out/device_${DEVICE}_focal.tar.xz
          mv out/device_${DEVICE}.tar.build out/device_${DEVICE}_focal.tar.build
          sed -i 's/deviceinfo_ubuntu_touch_release="focal"/deviceinfo_ubuntu_touch_release="24.04-1.x"/' deviceinfo
          ln -s device_${DEVICE}_24.04-1.x.tar.xz out/device_${DEVICE}.tar.xz
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/

  flashable:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git img2simg jq sudo wget xz-utils
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Prepare flashable
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          ./build/fetch-and-prepare-latest-ota.sh "utnext/arm64/android9plus/daily" "$DEVICE" ota
          mkdir -p out_flashable
          ./build/system-image-from-ota.sh ota/ubuntu_command out_flashable
      - name: Upload flashable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashable-output
          path: out_flashable/

  devel-flashable:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git img2simg jq sudo wget xz-utils zstd
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Prepare devel flashable
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          ln -sf device_${DEVICE}_24.04-1.x.tar.xz out/device_${DEVICE}.tar.xz
          ./build/prepare-fake-ota.sh out/device_${DEVICE}.tar.xz ota
          mkdir -p out_devel
          # Patch system-image-from-ota.sh: rm -f removed can fail with Permission denied
          # when the extracted 'removed' file is owned by root (from --owner=root archives).
          # This is non-fatal; suppress error and ignore exit code.
          sed -i 's/rm -f removed/rm -f removed 2>\/dev\/null || true/g' build/system-image-from-ota.sh
          ./build/system-image-from-ota.sh ota/ubuntu_command out_devel
          mv out_devel/rootfs.img out_devel/ubuntu.img
          chmod +x scripts/make-recovery-flashable-zip.sh
          ./scripts/make-recovery-flashable-zip.sh out_devel
          zstd -15 -T0 out_devel/ubuntu.img
          rm -f out_devel/ubuntu.img
      - name: Build fastboot flashable zip
        run: |
          chmod +x scripts/make-fastboot-flashable-zip.sh
          ./scripts/make-fastboot-flashable-zip.sh out_devel
      - name: Upload devel flashable
        uses: actions/upload-artifact@v4
        with:
          name: devel-flashable-output
          path: |
            out_devel/*boot.img
            out_devel/dtbo.img
            out_devel/system.img
            out_devel/ubuntu.img.zst
            out_devel/ubuntu-touch-pipa-recovery-flashable.zip
            out_devel/ubuntu-touch-pipa-fastboot-flashable.zip

  devel-flashable-focal:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git img2simg jq sudo wget xz-utils zstd
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Prepare focal dev flashable
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          ln -sf device_${DEVICE}_focal.tar.xz out/device_${DEVICE}.tar.xz
          sed -i 's/deviceinfo_ubuntu_touch_release="24.04-1.x"/deviceinfo_ubuntu_touch_release="focal"/' deviceinfo
          ./build/prepare-fake-ota.sh out/device_${DEVICE}.tar.xz ota
          mkdir -p out_focal
          sed -i 's/rm -f removed/rm -f removed 2>\/dev\/null || true/g' build/system-image-from-ota.sh
          ./build/system-image-from-ota.sh ota/ubuntu_command out_focal
          mv out_focal/rootfs.img out_focal/ubuntu.img
          chmod +x scripts/make-recovery-flashable-zip.sh
          ./scripts/make-recovery-flashable-zip.sh out_focal
          zstd -15 -T0 out_focal/ubuntu.img
          rm -f out_focal/ubuntu.img
          sed -i 's/deviceinfo_ubuntu_touch_release="focal"/deviceinfo_ubuntu_touch_release="24.04-1.x"/' deviceinfo
      - name: Build fastboot flashable zip (focal)
        run: |
          chmod +x scripts/make-fastboot-flashable-zip.sh
          ./scripts/make-fastboot-flashable-zip.sh out_focal
      - name: Rename focal zips
        run: |
          cd out_focal
          mv ubuntu-touch-pipa-recovery-flashable.zip ubuntu-touch-pipa-focal-recovery-flashable.zip
          mv ubuntu-touch-pipa-fastboot-flashable.zip ubuntu-touch-pipa-focal-fastboot-flashable.zip
      - name: Upload focal flashable
        uses: actions/upload-artifact@v4
        with:
          name: devel-flashable-focal-output
          path: |
            out_focal/*boot.img
            out_focal/dtbo.img
            out_focal/system.img
            out_focal/ubuntu.img.zst
            out_focal/ubuntu-touch-pipa-focal-recovery-flashable.zip
            out_focal/ubuntu-touch-pipa-focal-fastboot-flashable.zip

  release:
    needs: [build, flashable, devel-flashable, devel-flashable-focal]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Package release files
        run: |
          mkdir -p release
          cp -a release-artifacts/build-output/. release/
          mkdir -p release/flashable release/devel release/devel-focal
          cp -a release-artifacts/flashable-output/. release/flashable/
          cp -a release-artifacts/devel-flashable-output/. release/devel/
          cp -a release-artifacts/devel-flashable-focal-output/. release/devel-focal/
          cd release && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - name: Delete existing release for this tag
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/device_pipa_focal.tar.xz
            release/devel/*boot.img
            release/devel/ubuntu-touch-pipa-recovery-flashable.zip
            release/devel/ubuntu-touch-pipa-fastboot-flashable.zip
            release/devel-focal/*boot.img
            release/devel-focal/ubuntu-touch-pipa-focal-recovery-flashable.zip
            release/devel-focal/ubuntu-touch-pipa-focal-fastboot-flashable.zip
          generate_release_notes: true
          prerelease: true
