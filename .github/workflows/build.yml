name: Build

on:
  push:
    branches: [ "main", "halium-13" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "halium-13" ]
  workflow_dispatch:

env:
  ADAPTATION_TOOLS_BRANCH: main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            fakeroot flex git kmod libelf-dev libssl-dev libtinfo5 \
            lz4 python2 python3 sudo unzip wget xz-utils
          sudo ln -sf python2 /usr/bin/python
      - name: Download Android vendor/odm images
        run: |
          chmod +x scripts/fetch-android-partitions.sh
          ./scripts/fetch-android-partitions.sh
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Run build
        run: ./build.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/

  flashable:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git img2simg jq sudo wget xz-utils
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Prepare flashable
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          ./build/fetch-and-prepare-latest-ota.sh "utnext/arm64/android9plus/daily" "$DEVICE" ota
          mkdir -p out_flashable
          ./build/system-image-from-ota.sh ota/ubuntu_command out_flashable
      - name: Upload flashable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashable-output
          path: out_flashable/

  devel-flashable:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git img2simg jq sudo wget xz-utils zstd
      - name: Clone build tools
        run: git clone -b $ADAPTATION_TOOLS_BRANCH https://gitlab.com/ubports/porting/community-ports/halium-generic-adaptation-build-tools.git build
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/
      - name: Prepare devel flashable
        run: |
          DEVICE="$(source deviceinfo && echo $deviceinfo_codename)"
          ./build/prepare-fake-ota.sh out/device_${DEVICE}.tar.xz ota
          mkdir -p out_devel
          # Patch system-image-from-ota.sh: rm -f removed can fail with Permission denied
          # when the extracted 'removed' file is owned by root (from --owner=root archives).
          # This is non-fatal; suppress error and ignore exit code.
          sed -i 's/rm -f removed/rm -f removed 2>\/dev\/null || true/g' build/system-image-from-ota.sh
          ./build/system-image-from-ota.sh ota/ubuntu_command out_devel
          mv out_devel/rootfs.img out_devel/ubuntu.img
          chmod +x scripts/make-recovery-flashable-zip.sh
          ./scripts/make-recovery-flashable-zip.sh out_devel
          zstd -15 -T0 out_devel/ubuntu.img
          rm -f out_devel/ubuntu.img
      - name: Upload devel flashable
        uses: actions/upload-artifact@v4
        with:
          name: devel-flashable-output
          path: |
            out_devel/*boot.img
            out_devel/dtbo.img
            out_devel/recovery.img
            out_devel/system.img
            out_devel/ubuntu.img.zst
            out_devel/ubuntu-touch-pipa-recovery-flashable.zip

  release:
    needs: [build, flashable, devel-flashable]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Package release files
        run: |
          mkdir -p release
          cp -a release-artifacts/build-output/. release/
          mkdir -p release/flashable release/devel
          cp -a release-artifacts/flashable-output/. release/flashable/
          cp -a release-artifacts/devel-flashable-output/. release/devel/
          cd release && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          generate_release_notes: true
